name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (Clang 22, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        build_type: [Release, Debug]
        include:
          - build_type: Debug
            sanitize: ON
          - build_type: Release
            sanitize: OFF

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libre2-dev pkg-config \
            liburing-dev libbrotli-dev libzstd-dev

      - name: Install Clang 22
        run: |
          wget -q "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.5/LLVM-22.1.5-Linux-X64.tar.xz"
          tar xf LLVM-22.1.5-Linux-X64.tar.xz
          echo "$PWD/LLVM-22.1.5-Linux-X64/bin" >> $GITHUB_PATH

      - name: Build ngtcp2 & nghttp3
        run: |
          git clone --depth 1 https://github.com/ngtcp2/nghttp3.git /tmp/nghttp3
          cd /tmp/nghttp3 && git submodule update --init
          cmake -S /tmp/nghttp3 -B /tmp/nghttp3/build -DENABLE_LIB_ONLY=ON -DBUILD_TESTING=OFF
          cmake --build /tmp/nghttp3/build -j$(nproc)
          sudo cmake --install /tmp/nghttp3/build
          git clone --depth 1 https://github.com/ngtcp2/ngtcp2.git /tmp/ngtcp2
          cd /tmp/ngtcp2 && git submodule update --init
          cmake -S /tmp/ngtcp2 -B /tmp/ngtcp2/build -DENABLE_OPENSSL=OFF -DENABLE_GNUTLS=OFF \
            -DENABLE_WOLFSSL=OFF -DENABLE_BORINGSSL=OFF -DENABLE_PICOTLS=OFF \
            -DENABLE_LIB_ONLY=ON -DBUILD_TESTING=OFF
          cmake --build /tmp/ngtcp2/build -j$(nproc)
          sudo cmake --install /tmp/ngtcp2/build
          sudo ldconfig

      - name: Configure
        run: |
          mkdir build && cd build
          cmake \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTS=ON \
            -DBUILD_FUZZ=OFF \
            -DSANITIZE=${{ matrix.sanitize }} \
            ..

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: cd build && ctest --output-on-failure -j$(nproc)

      - name: Run test binary directly
        run: ./build/justserver_tests

  sanitizer:
    name: ASan + UBSan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libre2-dev pkg-config \
            liburing-dev libbrotli-dev libzstd-dev

      - name: Install Clang 22
        run: |
          wget -q "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.5/LLVM-22.1.5-Linux-X64.tar.xz"
          tar xf LLVM-22.1.5-Linux-X64.tar.xz
          echo "$PWD/LLVM-22.1.5-Linux-X64/bin" >> $GITHUB_PATH

      - name: Build ngtcp2 & nghttp3
        run: |
          git clone --depth 1 https://github.com/ngtcp2/nghttp3.git /tmp/nghttp3
          cd /tmp/nghttp3 && git submodule update --init
          cmake -S /tmp/nghttp3 -B /tmp/nghttp3/build -DENABLE_LIB_ONLY=ON -DBUILD_TESTING=OFF
          cmake --build /tmp/nghttp3/build -j$(nproc)
          sudo cmake --install /tmp/nghttp3/build
          git clone --depth 1 https://github.com/ngtcp2/ngtcp2.git /tmp/ngtcp2
          cd /tmp/ngtcp2 && git submodule update --init
          cmake -S /tmp/ngtcp2 -B /tmp/ngtcp2/build -DENABLE_OPENSSL=OFF -DENABLE_GNUTLS=OFF \
            -DENABLE_WOLFSSL=OFF -DENABLE_BORINGSSL=OFF -DENABLE_PICOTLS=OFF \
            -DENABLE_LIB_ONLY=ON -DBUILD_TESTING=OFF
          cmake --build /tmp/ngtcp2/build -j$(nproc)
          sudo cmake --install /tmp/ngtcp2/build
          sudo ldconfig

      - name: Configure with sanitizers
        run: |
          mkdir build && cd build
          cmake \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DBUILD_FUZZ=OFF \
            -DSANITIZE=ON \
            ..

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests under ASan/UBSan
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ./build/justserver_tests

  fuzz:
    name: Fuzz (300s pertest)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libre2-dev pkg-config \
            liburing-dev libbrotli-dev libzstd-dev

      - name: Install Clang 22
        run: |
          wget -q "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.5/LLVM-22.1.5-Linux-X64.tar.xz"
          tar xf LLVM-22.1.5-Linux-X64.tar.xz
          echo "$PWD/LLVM-22.1.5-Linux-X64/bin" >> $GITHUB_PATH

      - name: Build ngtcp2 & nghttp3
        run: |
          git clone --depth 1 https://github.com/ngtcp2/nghttp3.git /tmp/nghttp3
          cd /tmp/nghttp3 && git submodule update --init
          cmake -S /tmp/nghttp3 -B /tmp/nghttp3/build -DENABLE_LIB_ONLY=ON -DBUILD_TESTING=OFF
          cmake --build /tmp/nghttp3/build -j$(nproc)
          sudo cmake --install /tmp/nghttp3/build
          git clone --depth 1 https://github.com/ngtcp2/ngtcp2.git /tmp/ngtcp2
          cd /tmp/ngtcp2 && git submodule update --init
          cmake -S /tmp/ngtcp2 -B /tmp/ngtcp2/build -DENABLE_OPENSSL=OFF -DENABLE_GNUTLS=OFF \
            -DENABLE_WOLFSSL=OFF -DENABLE_BORINGSSL=OFF -DENABLE_PICOTLS=OFF \
            -DENABLE_LIB_ONLY=ON -DBUILD_TESTING=OFF
          cmake --build /tmp/ngtcp2/build -j$(nproc)
          sudo cmake --install /tmp/ngtcp2/build
          sudo ldconfig

      - name: Configure fuzz build
        run: |
          mkdir build-fuzz && cd build-fuzz
          cmake \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=OFF \
            -DBUILD_FUZZ=ON \
            ..

      - name: Build fuzz targets
        run: cmake --build build-fuzz -j$(nproc)

      - name: Fuzz HTTP/1.1 parser (3000s)
        run: timeout 3000 ./build-fuzz/fuzz_http_parser -max_len=8192 || true

      - name: Fuzz HTTP/2 + HPACK (3000s)
        run: timeout 3000 ./build-fuzz/fuzz_http2 -max_len=16384 || true

      - name: Fuzz WAF engine (3000s)
        run: timeout 3000 ./build-fuzz/fuzz_waf -max_len=4096 || true
