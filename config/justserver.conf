# JustServer Configuration File
# Lines starting with # are comments

# Network settings
bind_address = 0.0.0.0
port = 8443
backlog = 512
worker_threads = 4

# TLS settings
tls_enabled = true
tls_cert = /etc/justserver/cert.pem
tls_key = /etc/justserver/key.pem

# DDoS protection
max_connections_per_ip = 50
header_read_timeout_ms = 3000
request_body_timeout_ms = 10000
max_request_size = 8388608

# File serving
document_root = /var/www/html
index_file = index.html
chroot_enabled = false

# FastCGI (PHP)
fastcgi_enabled = true
fastcgi_socket = /run/php/php-fpm.sock

# WAF (Web Application Firewall)
waf_enabled = true

# Logging
log_level = info
