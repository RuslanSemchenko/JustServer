# JustServer Configuration File
# Lines starting with # are comments

# Network settings
bind_address = 0.0.0.0
port = 8443
backlog = 512
worker_threads = 4

# TLS settings
tls_enabled = true
tls_cert = /etc/justserver/cert.pem
tls_key = /etc/justserver/key.pem

# DDoS protection / Anti-Slowloris
max_connections_per_ip = 50
header_read_timeout_ms = 5000
request_body_timeout_ms = 10000
max_request_size = 8388608

# File serving
document_root = /var/www/html
index_file = index.html
chroot_enabled = false

# FastCGI (PHP)
fastcgi_enabled = true
fastcgi_socket = /run/php/php-fpm.sock

# WAF (Web Application Firewall) - RE2-powered with anomaly scoring
waf_enabled = true
waf_body_inspection_limit = 131072

# Security Headers (second line of defense against XSS)
security_headers_enabled = true
csp_enabled = true
csp_value = default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'
hsts_enabled = true
hsts_value = max-age=31536000; includeSubDomains; preload
xcto_enabled = true
xxss_enabled = true
xfo_enabled = true
xfo_value = DENY
referrer_policy_enabled = true
referrer_policy_value = strict-origin-when-cross-origin

# Logging
log_level = info
