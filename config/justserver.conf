# JustServer Configuration File
# Lines starting with # are comments

# Network settings
bind_address = 0.0.0.0
port = 8443
backlog = 512
worker_threads = 4

# TLS settings
tls_enabled = true
tls_cert = /etc/justserver/cert.pem
tls_key = /etc/justserver/key.pem

# mTLS (Mutual TLS for service mesh)
# mtls_enabled = false
# mtls_ca_cert = /etc/justserver/ca.pem

# Automatic Let's Encrypt (ACME)
# acme_enabled = false
# acme_email = admin@example.com
# acme_domains = example.com,www.example.com
# acme_storage = /etc/justserver/acme
# acme_use_staging = false

# DDoS protection / Anti-Slowloris
max_connections_per_ip = 50
header_read_timeout_ms = 5000
request_body_timeout_ms = 10000
max_request_size = 8388608

# File serving
document_root = /var/www/html
index_file = index.html
chroot_enabled = false

# FastCGI (PHP)
fastcgi_enabled = true
fastcgi_socket = /run/php/php-fpm.sock

# WAF (Web Application Firewall) - RE2-powered with anomaly scoring
waf_enabled = true
waf_body_inspection_limit = 131072

# JWT Edge Validation (Zero Trust)
# jwt_enabled = false
# jwt_hmac_secret = your-secret-key-here
# jwt_public_key = /etc/justserver/jwt_public.pem
# jwt_required_issuer = your-issuer
# jwt_required_audience = your-audience
# jwt_clock_skew_seconds = 60

# Compression (Brotli & Zstd)
# compression_enabled = true
# compression_min_size = 256
# compression_brotli_quality = 4
# compression_zstd_level = 3

# Reverse Proxy / Load Balancer
# proxy_enabled = false
# Example route:
# proxy_route = /api -> 10.0.0.1:8080,10.0.0.2:8080
# proxy_algorithm = round_robin
# proxy_connect_timeout_ms = 5000
# proxy_read_timeout_ms = 30000
# proxy_max_retries = 2

# Microcache
# cache_enabled = false
# cache_max_entries = 10000
# cache_max_memory_mb = 256
# cache_default_ttl_seconds = 60
# cache_stale_while_revalidate_seconds = 30

# Distributed Tracing (OpenTelemetry)
# tracing_enabled = false

# Anti-Bot System
# antibot_enabled = false
# antibot_ja3_enabled = true
# antibot_rate_limit_enabled = true
# antibot_rate_limit_rps = 10
# antibot_rate_limit_burst = 50
# antibot_js_challenge_enabled = false
# antibot_pow_enabled = false
# antibot_pow_difficulty = 18
# antibot_tarpit_enabled = true
# antibot_geoip_enabled = false
# antibot_geoip_database = /etc/justserver/GeoLite2-Country.mmdb
# antibot_blocked_countries = 

# WASM Plugins
# wasm_enabled = false
# wasm_plugin_dir = /etc/justserver/plugins
# wasm_max_memory_mb = 64
# wasm_timeout_ms = 100

# Security Headers (second line of defense against XSS)
security_headers_enabled = true
csp_enabled = true
csp_value = default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'
hsts_enabled = true
hsts_value = max-age=31536000; includeSubDomains; preload
xcto_enabled = true
xxss_enabled = true
xfo_enabled = true
xfo_value = DENY
referrer_policy_enabled = true
referrer_policy_value = strict-origin-when-cross-origin

# Logging
log_level = info
